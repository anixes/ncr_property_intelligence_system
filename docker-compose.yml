version: "3.9"

services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}-api:${IMAGE_TAG:-latest}
    container_name: ncr-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:${IMAGE_TAG:-latest}
    container_name: ncr-frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
