services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Override MLflow tracking URI for container (optional).
      # Leave empty to use the baked-in local joblib fallback.
      - MLFLOW_TRACKING_URI=
      # API bind settings (defaults match Dockerfile CMD)
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # CORS allowed origins (comma-separated). Default: allow all.
      - CORS_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      # Point Streamlit at the API service within the Docker network
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
