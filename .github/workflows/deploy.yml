name: Deploy ML App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: pip install dvc

      - name: Configure DVC Remote (DAGsHub)
        run: |
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc remote modify origin auth basic

      - name: Pull model from DVC
        run: dvc pull

      - name: Verify models exist
        run: |
          ls -lh models/sales/pipeline_sales.joblib
          ls -lh models/rentals/pipeline_rentals.joblib

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag and Lowercase Repo
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}-api:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}-frontend:latest

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/apps/ncr-app/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/apps/ncr-app
            cd ~/apps/ncr-app
            if [ ! -f .env ]; then
              echo "API_BASE_URL=http://api:8000" > .env
              echo "GITHUB_REPOSITORY=${{ env.REPO_LOWER }}" >> .env
            fi
            export GITHUB_REPOSITORY=${{ env.REPO_LOWER }}
            
            # Authenticate with GHCR to allow pulls
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

      - name: Post-Deploy Smoke Test (Confidence Layer)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting 15s for 'Pure ML' model loading and container warmup..."
            sleep 15
            echo "Running healthcheck on EC2..."
            if curl -f http://localhost:8000/health; then
              echo "SUCCESS: API is up and healthy."
            else
              echo "FAILURE: Healthcheck failed! Checking logs..."
              cd ~/apps/ncr-app/
              docker compose logs api --tail 50
              exit 1
            fi
