name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements_production.txt
            requirements_dev.txt

      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      - name: Lint (ruff check)
        run: ruff check ncr_property_price_estimation/ tests/

      - name: Format check (ruff format)
        run: ruff format --check ncr_property_price_estimation/ tests/

      - name: Run tests
        run: pytest -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy model artifact for build test
        run: |
          # The real model is tracked via DVC / Google Drive.
          # CI only validates that the Dockerfile builds correctly.
          mkdir -p models
          dd if=/dev/zero of=models/pipeline_v1.joblib bs=1024 count=1

      - name: Build Docker image
        run: docker build -t ncr-property-api:ci-test .
