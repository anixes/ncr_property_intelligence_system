name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Static Analysis (Fast)
  # ---------------------------------------------------------------------------
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Linting Tools
        run: pip install ruff==0.15.4
      - name: Lint check
        run: ruff check ncr_property_price_estimation/ tests/
      - name: Format check
        run: ruff format --check ncr_property_price_estimation/ tests/

  # ---------------------------------------------------------------------------
  # 2. Unit & Contract Tests (Fast, No DVC)
  # ---------------------------------------------------------------------------
  unit-and-contract:
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_dev.txt
      - name: Run Unit & API Contract Tests
        # Focus on fast tests that don't need real models
        run: |
          pytest tests/test_features.py tests/test_api_contract.py -v --tb=short

  # ---------------------------------------------------------------------------
  # 3. Model Quality Gate (Needs DVC Artifacts)
  # ---------------------------------------------------------------------------
  model-quality-gate:
    needs: unit-and-contract
    runs-on: ubuntu-latest
    # Only run on PRs or Main to save DVC bandwidth
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for DVC diffs/history
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements_dev.txt
      
      - name: Configure DVC Remote (DAGsHub)
        # Harmonized with existing repo secrets
        run: |
          dvc remote modify origin --project auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}
          
      - name: Pull Model Artifacts
        run: dvc pull -v
        
      - name: Run Model Quality Gate
        # Validate real model performance and data schemas
        run: |
          pytest tests/test_model_validation.py tests/test_data_schema.py -v --tb=short

  # ---------------------------------------------------------------------------
  # 4. Production Build Verification
  # ---------------------------------------------------------------------------
  build-verification:
    needs: model-quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create empty DVC directories for build verification
        run: mkdir -p data/ models/
      - name: Build API image
        run: docker build -t ncr-property-api:test .
