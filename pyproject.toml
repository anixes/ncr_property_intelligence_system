[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line-too-long — let formatter handle it
    "E402",   # import-not-at-top — train.py needs sys.path manipulation before imports
]

[tool.ruff.lint.isort]
known-first-party = ["ncr_property_price_estimation"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
