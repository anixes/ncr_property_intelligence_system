services:
  api:
    image: ghcr.io/anixes/ncr-property-api:v1
    ports:
      - "8000:8000"
    environment:
      # Optional: set MLFLOW_TRACKING_URI or other vars if needed
      - MLFLOW_TRACKING_URI=
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    image: ghcr.io/anixes/ncr-property-frontend:v1
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
